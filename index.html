<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYSON Media Group | Flagship Platform</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        :root {
            --bg-black: #050505;
            --bg-deep: #000000;
            --text-light: #f5f5f7;
            --text-muted: #6e6e73;
            --accent-glow: rgba(255, 255, 255, 0.15);
            --border-color: rgba(255, 255, 255, 0.035);
            --border-heavy: rgba(255, 255, 255, 0.08);
            --font-editorial: 'Cormorant Garamond', Georgia, serif;
            --font-accent: 'Montserrat', sans-serif;
            --transition-main: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: var(--bg-black); color: var(--text-light);
            font-family: var(--font-accent); font-weight: 200; line-height: 1.65; overflow-x: hidden;
            letter-spacing: -0.01em;
        }
        body.intro-active { overflow: hidden; height: 100vh; }

        /* Cinematic Motion Frame Preloader */
        #preloader-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-deep); z-index: 99999;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            opacity: 1; transition: opacity 1.6s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
        }
        #preloader-canvas video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }

        /* Fine Grain Texture Overlap Layer */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; opacity: 0.022; pointer-events: none; z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Minimal Fixed Header Navigation */
        header {
            position: fixed; top: 0; left: 0; width: 100%; padding: 2.2rem 5%; display: flex; justify-content: space-between; align-items: center; z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95) 60%, rgba(0,0,0,0)); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color);
        }
        .nav-brand-container { display: flex; align-items: center; gap: 1rem; }
        .nav-logo img { height: 12px; width: auto; display: block; opacity: 0.95; letter-spacing: 0.05em; }
        
        .nav-right-cluster { display: flex; align-items: center; gap: 4.5rem; }
        nav { display: flex; gap: 3.5rem; }
        nav a { color: var(--text-light); text-decoration: none; font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase; opacity: 0.4; transition: var(--transition-main); font-weight: 400; }
        nav a:hover { opacity: 1; }

        .search-container { position: relative; display: flex; align-items: center; border-left: 1px solid var(--border-color); padding-left: 2rem; }
        .search-input {
            background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.05);
            color: var(--text-light); font-family: var(--font-accent); font-size: 0.7rem; font-weight: 300;
            padding: 0.3rem 0.5rem 0.3rem 0; width: 120px; letter-spacing: 0.15em; transition: var(--transition-main);
        }
        .search-input:focus { outline: none; width: 200px; border-color: rgba(255,255,255,0.3); }
        .search-input::placeholder { color: rgba(255,255,255,0.18); text-transform: uppercase; font-size: 0.58rem; letter-spacing: 0.25em; }

        /* Layout Framework Sub-sections */
        section { padding: 12rem 5%; max-width: 1750px; margin: 0 auto; position: relative; }
        .section-tag-line { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 4.5rem; }
        .section-tag { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.45em; color: var(--text-muted); font-weight: 500; }
        .section-line { height: 1px; flex-grow: 1; background: var(--border-color); }

        /* Massive Hero Brand Canvas */
        .hero-deck { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 4%; position: relative; background: var(--bg-deep); }
        .hero-logo-container {
            max-width: 1350px;
            width: 95%;
            margin-bottom: 5.5rem;
            opacity: 0;
            transform: translateY(25px);
            animation: revealBrand 2s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        }
        .hero-logo-container img { width: 100%; height: auto; display: block; }
        
        .hero-deck h1 { 
            font-family: var(--font-editorial); font-size: calc(1.4rem + 1.4vw); font-weight: 300; font-style: italic; 
            max-width: 1000px; color: rgba(255,255,255,0.65); letter-spacing: -0.01em; line-height: 1.35;
            opacity: 0; transform: translateY(20px);
            animation: revealBrand 2s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
        }
        .scroll-indicator { position: absolute; bottom: 4rem; font-size: 0.6rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--text-muted); animation: microPulse 2s infinite ease-in-out; }

        /* Widescreen Custom Cinema Screening Interface */
        .broadcast-hub { max-width: 100%; padding: 6rem 5% 12rem 5%; background: linear-gradient(to bottom, var(--bg-deep), var(--bg-black)); }
        .video-canvas-wrapper { border: 1px solid var(--border-color); background: #000; padding: 0.5rem; position: relative; cursor: pointer; }
        .video-canvas-container { width: 100%; aspect-ratio: 21/9; position: relative; overflow: hidden; }
        .video-canvas-container video { width: 100%; height: 100%; object-fit: cover; opacity: 0.55; filter: contrast(102%) grayscale(10%); transition: var(--transition-main); }
        .video-canvas-wrapper:hover video { opacity: 0.7; }
        
        .video-interface-overlay { position: absolute; bottom: 2rem; left: 2rem; right: 2rem; display: flex; justify-content: space-between; align-items: center; pointer-events: none; opacity: 0.7; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-light); }
        .video-status { display: flex; align-items: center; gap: 0.6rem; }
        .video-status span { width: 6px; height: 6px; background: #ff3b30; border-radius: 50%; display: inline-block; }

        /* Full-Bleed Cinema Strip Slider Subsystem */
        .carousel-deck { position: relative; width: 100%; aspect-ratio: 21/9; border: 1px solid var(--border-color); overflow: hidden; background: #020203; }
        .carousel-visual-pane { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .carousel-img-item { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; opacity:0; scale: 1.04; transition: opacity 1.4s cubic-bezier(0.25, 1, 0.5, 1), scale 1.8s cubic-bezier(0.25, 1, 0.5, 1); filter: grayscale(15%) brightness(35%); }
        .carousel-img-item.active { opacity: 0.65; scale: 1; }

        .carousel-content-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 5rem; z-index: 2;
            display: flex; justify-content: space-between; align-items: flex-end;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
        }
        .carousel-text-box { max-width: 700px; }
        .carousel-title { font-family: var(--font-editorial); font-size: calc(1.8rem + 1.4vw); font-weight: 300; line-height: 1.15; margin-bottom: 1.2rem; letter-spacing: -0.01em; }
        .carousel-excerpt { color: rgba(255,255,255,0.45); font-size: 0.92rem; font-weight: 300; max-width: 550px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.6; }
        
        .carousel-nav-interface { display: flex; flex-direction: column; align-items: flex-end; gap: 2rem; }
        .carousel-link { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.3em; color: var(--text-light); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 0.3rem; transition: var(--transition-main); font-weight: 500; cursor: pointer; }
        .carousel-link:hover { border-color: var(--text-light); opacity: 0.8; }
        
        .carousel-controls { display: flex; align-items: center; gap: 2.5rem; }
        .ctrl-btn { background: none; border: none; color: rgba(255,255,255,0.3); font-size: 1rem; cursor: pointer; padding: 0.5rem; transition: color 0.3s; }
        .ctrl-btn:hover { color: var(--text-light); }
        .carousel-counter { font-size: 0.68rem; letter-spacing: 0.25em; color: rgba(255,255,255,0.18); font-weight: 400; }

        /* Advanced Tab Matrix System Filter Header */
        .catalog-matrix-controls { display: flex; gap: 2rem; margin-bottom: 4.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none; }
        .catalog-matrix-controls::-webkit-scrollbar { display: none; }
        .matrix-tab { background: none; border: none; color: var(--text-muted); font-family: var(--font-accent); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.25em; cursor: pointer; padding-bottom: 1rem; position: relative; transition: var(--transition-main); font-weight: 500; }
        .matrix-tab:hover { color: var(--text-light); }
        .matrix-tab.active { color: var(--text-light); }
        .matrix-tab.active::after { content: ""; position: absolute; bottom: -1px; left: 0; width: 100%; height: 1px; background: #fff; }
        
        .catalog-header-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2rem; }
        .results-counter-node { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.2em; color: rgba(255,255,255,0.15); }

        /* Premium Print Layout Catalog Grid */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 6.5rem 3.5rem; }
        .item-card { text-decoration: none; color: inherit; display: flex; flex-direction: column; opacity: 0; transform: translateY(15px); animation: itemReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; cursor: pointer; }
        .img-wrapper { width: 100%; aspect-ratio: 16/10; background: #080809; margin-bottom: 2rem; overflow: hidden; border: 1px solid var(--border-color); position: relative; }
        
        /* Play State Overlay */
        .img-wrapper::after { content: "PLAY"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.6rem; letter-spacing: 0.4em; font-weight: 500; color: #fff; opacity: 0; transition: var(--transition-main); z-index: 2; border: 1px solid rgba(255,255,255,0.2); padding: 0.8rem 1.4rem; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); }
        .item-card:hover .img-wrapper::after { opacity: 1; letter-spacing: 0.5em; }

        .item-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; filter: grayscale(30%); transition: var(--transition-main); }
        .item-card:hover img { transform: scale(1.02); opacity: 0.6; filter: grayscale(0%); }
        
        .card-meta { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.25em; color: var(--text-muted); margin-bottom: 0.9rem; font-weight: 500; display: flex; justify-content: space-between; }
        .card-meta-chan { color: rgba(255,255,255,0.25); }
        .card-title { font-family: var(--font-editorial); font-size: 1.85rem; font-weight: 400; line-height: 1.25; margin-bottom: 0.7rem; letter-spacing: -0.005em; }
        .card-excerpt { color: var(--text-muted); font-size: 0.88rem; font-weight: 300; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.65; }
        .no-results { display: none; text-align: center; padding: 9rem 0; font-family: var(--font-editorial); font-size: 1.8rem; color: var(--text-muted); font-style: italic; border: 1px dashed var(--border-color); }

        /* Broadcast Divisions Network System Matrix */
        .matrix-deck { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3rem; }
        .matrix-cell { border: 1px solid var(--border-color); background: rgba(255,255,255,0.002); padding: 4.5rem 3.5rem; text-decoration: none; color: inherit; transition: var(--transition-main); display: flex; flex-direction: column; justify-content: space-between; min-height: 350px; position: relative; }
        .matrix-cell:hover { border-color: var(--border-heavy); background: rgba(255,255,255,0.01); }
        
        .matrix-cell-arrow { position: absolute; top: 3rem; right: 3rem; font-size: 0.8rem; opacity: 0.15; transition: var(--transition-main); }
